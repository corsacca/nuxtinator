# Don't auto-install peerDependencies. In production builds LAYERS_PATH is unset,
# so each layer is fetched by giget and installed (`install: true`) into its own
# isolated node_modules/.c12/<hash>/. bun installs peerDependencies by default,
# which would make every layer re-install the entire Nuxt/Vue/Kysely framework
# (declared as peers) into its own tree — multiplying disk usage across all
# layers and overflowing the Railway build volume. With peer = false, layers
# install only their real dependencies; framework peers resolve up to host's
# single copy, as intended.
[install]
peer = false
